<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consultoría Energética</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.card {
  margin-top: 20px;
  padding: 15px;
  background: #1e293b;
}
</style>
</head>

<body>

<div class="container">

<h2>Registro de Visita</h2>

<select id="usuario"></select>
<input type="date" id="fecha">
<input type="time" id="hora">
<input type="text" id="nombre_negocio" placeholder="Negocio">
<input type="text" id="responsable" placeholder="Responsable">
<input type="text" id="direccion" placeholder="Dirección">
<input type="text" id="telefono" placeholder="Teléfono">
<textarea id="observaciones" placeholder="Observaciones"></textarea>

<button onclick="guardar()">Guardar Visita</button>

<div id="preview" class="card"></div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxxVjrmRGxaWY0_d98yZZREuy-EgaS7ruwBbEeLSb13kww_e_kcqW1jCH8HFG9r5Lv7g/exec";

// usuarios
for (let i = 1; i <= 15; i++) {
  let opt = document.createElement("option");
  opt.value = "usuario" + i;
  opt.text = "usuario" + i;
  usuario.appendChild(opt);
}

async function guardar() {

  const data = {
    usuario: usuario.value,
    fecha_visita: fecha.value,
    hora_visita: hora.value,
    nombre_negocio: nombre_negocio.value,
    responsable: responsable.value,
    direccion: direccion.value,
    telefono: telefono.value,
    observaciones: observaciones.value,
    visit_id: Date.now()
  };

  // preview
  preview.innerHTML = `
    <h3>${data.nombre_negocio}</h3>
    <p>${data.responsable}</p>
    <p>${data.direccion}</p>
    <p>${data.telefono}</p>
  `;

  // generar imagen
  const canvas = await html2canvas(preview);
  const imageBase64 = canvas.toDataURL("image/jpeg");

  data.imageBase64 = imageBase64;
  data.filename = "visita_" + Date.now() + ".jpg";

  console.log("ENVIANDO:", data);

  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const text = await res.text();
  console.log("RESPUESTA:", text);

  alert("Visita guardada");
}
</script>

</body>
</html>
