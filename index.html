<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Visitas</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
body { font-family: Arial; padding:20px; background:#f2f2f2; }
input, textarea, select { width:100%; padding:10px; margin:5px 0; }
button { padding:15px; background:green; color:white; border:none; cursor:pointer; }
#preview { background:white; padding:20px; margin-top:20px; }
</style>
</head>

<body>

<h2>Registro de Visita</h2>

<select id="usuario">
  <option value="Jeny">Jeny</option>
  <option value="Ariana">Ariana</option>
    <option value="Maria Carolina">Maria Carolina</option>
  <option value="Luis">Luis</option>
    <option value="Test">Test</option>
</select>

<input type="date" id="fecha">
<input type="time" id="hora">
<input type="text" id="negocio" placeholder="Negocio">
<input type="text" id="responsable" placeholder="Responsable">
<input type="text" id="direccion" placeholder="Dirección">
<input type="text" id="telefono" placeholder="Teléfono">
<textarea id="observaciones" placeholder="Observaciones"></textarea>

<button onclick="guardar()">GUARDAR</button>

<div id="preview"></div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz71BF4e1YdfZTYbzat20EnIpkznPWLWOaptmSVyQKKWipYzaD6_nQTqcRUxIAV3yObew/exec";

async function guardar() {

  const data = {
    usuario: document.getElementById('usuario').value,
    fecha_visita: document.getElementById('fecha').value,
    hora_visita: document.getElementById('hora').value,
    nombre_negocio: document.getElementById('negocio').value,
    responsable: document.getElementById('responsable').value,
    direccion: document.getElementById('direccion').value,
    telefono: document.getElementById('telefono').value,
    observaciones: document.getElementById('observaciones').value,
    visit_id: Date.now()
  };

  // ===== PREVIEW =====
  const preview = document.getElementById("preview");
  preview.innerHTML = `
    <h3>${data.nombre_negocio}</h3>
    <p>${data.responsable}</p>
    <p>${data.fecha_visita} ${data.hora_visita}</p>
    <p>${data.direccion}</p>
  `;

  await new Promise(r => setTimeout(r, 200));

  const canvas = await html2canvas(preview);
  data.imageBase64 = canvas.toDataURL("image/jpeg");
  data.filename = "visita.jpg";

  // ===== FORM DATA =====
  const formData = new FormData();
  for (let key in data) {
    formData.append(key, data[key]);
  }

  // ===== ENVÍO =====
  await fetch(SCRIPT_URL, {
    method: "POST",
    body: formData
  });

  alert("Guardado correctamente");
}

</script>

</body>
</html>
