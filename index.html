<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color: white;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.panel {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

button {
  padding: 15px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  margin: 5px;
}

.start { background: #27ae60; }
.stop { background: #e74c3c; }
.afk { background: #f39c12; }
.back { background: #3498db; }

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h2>⚡ Sistema Comercial</h2>

<div class="panel">
<select id="usuario"></select>

<button class="start" onclick="start()">START</button>
<button class="stop" onclick="stop()">STOP</button>
<button class="afk" onclick="afk()">AFK</button>
<button class="back" onclick="back()">BACK</button>
</div>

<div class="panel">
<input type="date" id="fecha">
<input type="time" id="hora">
<input type="text" id="negocio" placeholder="Negocio">
<input type="text" id="responsable" placeholder="Responsable">
<input type="text" id="direccion" placeholder="Dirección">
<input type="text" id="telefono" placeholder="Teléfono">
<textarea id="observaciones"></textarea>

<button onclick="guardar()">Guardar Visita</button>
</div>

<div id="preview" class="card"></div>

</div>

<script>

// usuarios
for (let i = 1; i <= 15; i++) {
  let opt = document.createElement("option");
  opt.value = "usuario" + i;
  opt.text = "usuario" + i;
  usuario.appendChild(opt);
}

// ===== ACTIVIDAD =====
function enviarActividad(tipo, desc) {
  google.script.run.guardarActividad({
    usuario: usuario.value,
    tipo: tipo,
    descripcion: desc
  });
}

function start(){ enviarActividad("START","Inicio jornada"); }
function stop(){ enviarActividad("STOP","Fin jornada"); }
function afk(){ enviarActividad("AFK","Pausa"); }
function back(){ enviarActividad("BACK","Vuelve"); }

// ===== VISITA =====
async function guardar(){

  const data = {
    usuario: usuario.value,
    fecha: fecha.value,
    hora: hora.value,
    negocio: negocio.value,
    responsable: responsable.value,
    direccion: direccion.value,
    telefono: telefono.value,
    observaciones: observaciones.value,
    visit_id: Date.now()
  };

  preview.innerHTML = `
    <h3>${data.negocio}</h3>
    <p>${data.responsable}</p>
    <p>${data.direccion}</p>
    <p>${data.telefono}</p>
  `;

  const canvas = await html2canvas(preview);
  data.imageBase64 = canvas.toDataURL("image/jpeg");
  data.filename = "visita_"+Date.now()+".jpg";

  google.script.run
    .withSuccessHandler(()=> alert("Guardado OK"))
    .guardarVisita(data);
}

</script>

</body>
</html>
