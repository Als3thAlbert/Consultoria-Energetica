<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.card {
  margin-top: 20px;
  padding: 15px;
  background: #1e293b;
}
</style>
</head>

<body>

<div class="container">

<h2>⚡ Consultoría Energética</h2>

<select id="usuario"></select>
<input type="date" id="fecha">
<input type="time" id="hora">
<input type="text" id="negocio" placeholder="Negocio">
<input type="text" id="responsable" placeholder="Responsable">
<input type="text" id="direccion" placeholder="Dirección">
<input type="text" id="telefono" placeholder="Teléfono">
<textarea id="observaciones" placeholder="Observaciones"></textarea>

<button onclick="guardar()">Guardar Visita</button>

<div id="preview" class="card"></div>

</div>

<script>

// usuarios
for (let i = 1; i <= 15; i++) {
  let opt = document.createElement("option");
  opt.value = "usuario" + i;
  opt.text = "usuario" + i;
  usuario.appendChild(opt);
}

// guardar visita
async function guardar() {

  const data = {
    usuario: usuario.value,
    fecha: fecha.value,
    hora: hora.value,
    negocio: negocio.value,
    responsable: responsable.value,
    direccion: direccion.value,
    telefono: telefono.value,
    observaciones: observaciones.value,
    visit_id: Date.now()
  };

  preview.innerHTML = `
    <h3>${data.negocio}</h3>
    <p>${data.responsable}</p>
    <p>${data.direccion}</p>
    <p>${data.telefono}</p>
  `;

  const canvas = await html2canvas(preview);
  const imageBase64 = canvas.toDataURL("image/jpeg");

  data.imageBase64 = imageBase64;
  data.filename = "visita_" + Date.now() + ".jpg";

  google.script.run
    .withSuccessHandler(res => {
      alert("Guardado OK");
      console.log(res);
    })
    .guardarVisita(data);
}

</script>

</body>
</html>
