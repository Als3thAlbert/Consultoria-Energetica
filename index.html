<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Visitas</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #B164E3;
  color: white;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 5px;
  border: none;
}

button {
  padding: 15px;
  width: 100%;
  background: green;
  color: white;
  border: none;
  margin-top: 10px;
  font-size: 16px;
}

.preview {
  background: white;
  color: black;
  padding: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h2>Registro de Visita</h2>

<select id="usuario">
  <option value="Jeny">Jeny</option>
  <option value="Ariana">Ariana</option>
  <option value="Luis">Luis</option>
  <option value="Maria Carolina">Maria Carolina</option>
</select>

<input type="date" id="fecha">
<input type="time" id="hora">
<input type="text" id="negocio" placeholder="Negocio">
<input type="text" id="responsable" placeholder="Responsable">
<input type="text" id="direccion" placeholder="Dirección">
<input type="text" id="telefono" placeholder="Teléfono">
<textarea id="observaciones" placeholder="Observaciones"></textarea>

<button onclick="guardar()">Guardar</button>

<div id="preview" class="preview"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzbH1g3wZ6KmxmA1qTeyb7YX5xwrcxZpnhOaHj4WFXnz09XJQ0wiYHaB57P-lFFdjuSHg/exec";

async function guardar(){

  const data = {
    usuario: usuario.value,
    fecha_visita: fecha.value,
    hora_visita: hora.value,
    nombre_negocio: negocio.value,
    responsable: responsable.value,
    direccion: direccion.value,
    telefono: telefono.value,
    observaciones: observaciones.value,
    visit_id: Date.now()
  };

  preview.innerHTML = `
    <h3>${data.nombre_negocio}</h3>
   
    <p>${data.fecha}</p>
    <p>${data.hora}</p>
    <h3>${data.responsable}</h3>
    <p>${data.direccion}</p>
    <p>${data.telefono}</p>
     <h2>${data.usuario}</h2>
  `;

  const canvas = await html2canvas(preview);
  data.imageBase64 = canvas.toDataURL("image/jpeg");
  data.filename = "visita.jpg";

  const formData = new FormData();

  for (let key in data) {
    formData.append(key, data[key]);
  }

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: formData
  });

  alert("Guardado");

}
</script>

</body>
</html>
