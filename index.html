<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consultoría Energética</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color: white;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  background: #22c55e;
}

.preview {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h2>⚡ Registro de Visita</h2>

<div class="card">

<select id="usuario"></select>

<input type="date" id="fecha">
<input type="time" id="hora">
<input type="text" id="negocio" placeholder="Negocio">
<input type="text" id="responsable" placeholder="Responsable">
<input type="text" id="direccion" placeholder="Dirección">
<input type="text" id="telefono" placeholder="Teléfono">
<textarea id="observaciones" placeholder="Observaciones"></textarea>

<button onclick="guardar()">Guardar Visita</button>

</div>

<div id="preview" class="preview"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyt539iCaTir4g2YXjzFE-U0nCsRNroMldzKf5gNx8cMES3EwZ6HDXZGMgtmpxMslpnyQ/exec";

// usuarios
for(let i=1;i<=15;i++){
  let o=document.createElement("option");
  o.value="usuario"+i;
  o.text="usuario"+i;
  usuario.appendChild(o);
}

// guardar
async function guardar(){

  const data={
    usuario:usuario.value,
    fecha:fecha.value,
    hora:hora.value,
    negocio:negocio.value,
    responsable:responsable.value,
    direccion:direccion.value,
    telefono:telefono.value,
    observaciones:observaciones.value,
    visit_id:Date.now()
  };

  preview.innerHTML=`
    <h3>${data.negocio}</h3>
    <p>${data.responsable}</p>
    <p>${data.direccion}</p>
    <p>${data.telefono}</p>
  `;

  const canvas = await html2canvas(preview);
  data.imageBase64 = canvas.toDataURL("image/jpeg");
  data.filename = "visita_"+Date.now()+".jpg";

  // 🔥 FETCH CORRECTO (SIN CORS PROBLEMAS)
  await fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  });

  alert("Visita enviada (verifica en Google Sheets)");
}

</script>

</body>
</html>
